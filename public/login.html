<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unibite - Σύνδεση</title>
    <link rel="stylesheet"  href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-default">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="login.html">Unibite</a>
        </div>
    </nav>

    <div class="container">
    <div class="row">
        <div class="col-md-4 col-md-offset-4 col-sm-6 col-sm-offset-3">
             <h2 class="text-center">Σύνδεση</h2>
              <div id="error-msg" class="alert alert-danger hidden"></div>
        <form id="login-form">
            <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="π.χ. student@upatras.gr">
                </div>
                 <div class="form-group">
                    <label for="password">Κωδικός</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Κωδικός πρόσβασης">
                </div>
                    <button type="submit" class="btn btn-primary btn-block">Σύνδεση</button>
            </form>
 
            <p class="text-center">Δεν έχεις λογαριασμό; <a href="register.html">Εγγραφή εδώ</a></p>
 
        </div>
    </div>
</div>
    
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<script src="auth.js"></script>

</body>
</html>
