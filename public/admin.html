<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UniBite - Admin</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed"
                    data-toggle="collapse" data-target="#main-nav">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="admin.html">UniBite Admin</a>
        </div>
        <div class="collapse navbar-collapse" id="main-nav">
            <ul class="nav navbar-nav navbar-right">
                <li><a href="#" id="btn-logout">Αποσύνδεση</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">

    <div id="error-msg" class="alert alert-danger hidden"></div>

    <div class="row">
        <div class="col-md-12">
            <h3>Στατιστικά Τελευταίου Μήνα</h3>
            <div id="loading-stats">
                <p class="text-muted">Φόρτωση στατιστικών</p>
            </div>
            <div id="stats-container"></div>
        </div>
    </div>

    <hr>

    <!-- Δ2: Leaderboard -->
    <div class="row">
        <div class="col-md-6">
            <h3>Top Donor</h3>
            <div id="loading-donor">
                <p class="text-muted">Φόρτωση</p>
            </div>
            <div id="donor-container"></div>
        </div>

        <div class="col-md-6">
            <h3>Γεύματα με Υψηλότερη Αξιολόγηση</h3>
            <div id="loading-ratings">
                <p class="text-muted">Φόρτωση</p>
            </div>
            <div id="ratings-container"></div>
        </div>
    </div>

</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<script src="admin.js"></script>

</body>
</html>
